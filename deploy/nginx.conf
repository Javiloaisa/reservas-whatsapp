# Reverse proxy TLS para el agente. Colocar en /etc/nginx/sites-available/agente-podologo
# y enlazar a sites-enabled. El bloque TLS lo completa `certbot --nginx`.
#
# El backend (uvicorn) escucha solo en 127.0.0.1:8000; Nginx es el unico expuesto.

server {
    listen 80;
    server_name agente.tu-dominio.com;

    # Redirige todo a HTTPS (certbot suele anadir esto automaticamente).
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name agente.tu-dominio.com;

    # Rutas de certificado que rellena certbot:
    # ssl_certificate     /etc/letsencrypt/live/agente.tu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/agente.tu-dominio.com/privkey.pem;

    # Meta puede enviar payloads de webhook con cierto tamano.
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
